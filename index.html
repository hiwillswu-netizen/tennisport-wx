<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />
    <title>杭州网球订场助手</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
      html, body, #root {
        height: 100%;
      }
      body {
        background: #f5f5f5;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      /* 前台移动端容器禁止滚动，由内部内容区域控制 */
      .mobile-container {
        overflow: hidden;
      }
      /* 隐藏 Kimi Agent 悬浮按钮 */
      [id*="kimi-agent"],
      [class*="kimi-agent"],
      [id*="kimi_agent"],
      [class*="kimi_agent"],
      [id*="kimi-plugin"],
      [class*="kimi-plugin"] {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
        width: 0 !important;
        height: 0 !important;
        position: fixed !important;
        bottom: -9999px !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // 移除 Kimi Agent 悬浮按钮
      (function() {
        function removeKimiAgent() {
          var selectors = [
            '[id*="kimi-agent"]', '[class*="kimi-agent"]',
            '[id*="kimi_agent"]', '[class*="kimi_agent"]',
            '[id*="kimi-plugin"]', '[class*="kimi-plugin"]',
            '[id*="kimi"]', '[class*="kimi"]',
            'a[href*="kimi"]', 'iframe[src*="kimi"]'
          ];
          selectors.forEach(function(s) {
            document.querySelectorAll(s).forEach(function(el) {
              el.style.display = 'none !important';
              el.style.visibility = 'hidden !important';
              el.style.opacity = '0 !important';
              el.style.pointerEvents = 'none !important';
              el.style.width = '0 !important';
              el.style.height = '0 !important';
              el.style.position = 'absolute !important';
              el.style.bottom = '-9999px !important';
              el.style.zIndex = '-9999 !important';
              if (el.parentNode && el.parentNode !== document.body) {
                try { el.parentNode.removeChild(el); } catch(e) {}
              }
            });
          });
        }
        removeKimiAgent();
        setInterval(removeKimiAgent, 1000);
        window.addEventListener('load', removeKimiAgent);
        document.addEventListener('DOMContentLoaded', removeKimiAgent);
      })();
    </script>
  </body>
</html>
